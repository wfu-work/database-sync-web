<section class="client-create-page">
  <div class="client-create-header">
    <title-label
      title="新建客户端凭证"
      description="创建 Bridge 或 App 接入 Relay 所需的 clientId 与 clientSecret。"
      [showBack]="true"
    />
  </div>

  <nz-card class="card-border" [nzBordered]="false">
    <form nz-form [formGroup]="form" (ngSubmit)="submit()">
      <se-container col="2" nzLayout="vertical">
        <se label="客户端类型" required error="请选择客户端类型">
          <nz-select id="clientType" formControlName="clientType">
            <nz-option nzValue="bridge" nzLabel="Bridge" />
            <nz-option nzValue="app" nzLabel="App" />
          </nz-select>
        </se>

        <se label="客户端名称" required error="请输入客户端名称">
          <input id="name" nz-input formControlName="name" placeholder="例如：生产 Bridge 网关" />
        </se>

        <se label="账号 GUID">
          <input
            id="accountGuid"
            nz-input
            formControlName="accountGuid"
            placeholder="已有账号 GUID"
          />
        </se>

        <se label="账号名称">
          <input id="accountName" nz-input formControlName="accountName" placeholder="default" />
        </se>

        <se label="平台">
          <input
            id="platform"
            nz-input
            formControlName="platform"
            placeholder="macOS / Linux / Web"
          />
        </se>

        <se label="版本">
          <input id="version" nz-input formControlName="version" placeholder="1.0.0" />
        </se>
      </se-container>

      <nz-alert
        class="client-create-tip"
        nzType="info"
        nzShowIcon
        nzMessage="账号 GUID 留空时会按账号名称自动创建账号并初始化免费额度。clientSecret 创建后只展示一次。"
      />

      <div class="client-create-actions">
        <button nz-button type="button" nzShape="round" (click)="back()">取消</button>
        <button nz-button nzType="primary" nzShape="round" [nzLoading]="saving" htmlType="submit">
          创建凭证
        </button>
      </div>
    </form>
  </nz-card>

  @if (result) {
    <nz-card class="card-border result-card" [nzBordered]="false">
      <nz-alert
        nzType="warning"
        nzShowIcon
        nzMessage="请立即保存 clientSecret。离开页面后无法再次查看，只能重新轮换。"
      />

      <div class="secret-grid">
        <span>clientId</span>
        <code>{{ result.clientId }}</code>
        <button nz-button nzSize="small" (click)="copy(result.clientId, 'clientId')">复制</button>

        <span>clientSecret</span>
        <code>{{ result.clientSecret }}</code>
        <button nz-button nzSize="small" (click)="copy(result.clientSecret, 'clientSecret')">
          复制
        </button>

        <span>accountGuid</span>
        <code>{{ result.accountGuid }}</code>
        <button nz-button nzSize="small" (click)="copy(result.accountGuid, 'accountGuid')">
          复制
        </button>
      </div>

      <div class="sample-box">
        <div class="sample-title">WebSocket 接入示例</div>
        <code>{{ sampleUrl() }}</code>
        <p>
          签名载荷为 clientId、clientType、roomId、timestamp、nonce 按换行拼接后使用 clientSecret 做
          HMAC-SHA256。
        </p>
      </div>

      <div class="client-create-actions">
        <button nz-button nzType="primary" nzShape="round" (click)="back()">返回列表</button>
      </div>
    </nz-card>
  }
</section>
