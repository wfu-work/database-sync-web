<section class="edit-page">
  <div class="page-header">
    <title-label title="编辑凭证" description="调整客户端名称、平台版本和启用状态。" />
    <button nz-button (click)="back()">
      <i nz-icon nzType="arrow-left"></i>
      返回
    </button>
  </div>

  <nz-card class="edit-card" [nzBordered]="false" [nzLoading]="loading">
    @if (client) {
      <div class="identity-row">
        <div>
          <span>clientId</span>
          <strong>{{ client.clientId }}</strong>
        </div>
        <div>
          <span>账号</span>
          <strong>{{ client.accountName || client.accountGuid }}</strong>
        </div>
        <div>
          <span>类型</span>
          <strong>{{ client.clientType }}</strong>
        </div>
      </div>

      <form nz-form [formGroup]="form" class="edit-form" (ngSubmit)="submit()">
        <nz-form-item>
          <nz-form-label nzRequired nzFor="name">名称</nz-form-label>
          <nz-form-control nzErrorTip="请输入名称">
            <input id="name" nz-input formControlName="name" />
          </nz-form-control>
        </nz-form-item>

        <div class="form-grid">
          <nz-form-item>
            <nz-form-label nzFor="platform">平台</nz-form-label>
            <nz-form-control>
              <input id="platform" nz-input formControlName="platform" />
            </nz-form-control>
          </nz-form-item>

          <nz-form-item>
            <nz-form-label nzFor="version">版本</nz-form-label>
            <nz-form-control>
              <input id="version" nz-input formControlName="version" />
            </nz-form-control>
          </nz-form-item>
        </div>

        <nz-form-item>
          <nz-form-label nzFor="status">状态</nz-form-label>
          <nz-form-control>
            <nz-select id="status" formControlName="status">
              <nz-option [nzValue]="2" nzLabel="启用" />
              <nz-option [nzValue]="3" nzLabel="禁用" />
              <nz-option [nzValue]="4" nzLabel="已吊销" />
            </nz-select>
          </nz-form-control>
        </nz-form-item>

        <div class="form-actions">
          <button nz-button type="button" (click)="back()">取消</button>
          <button nz-button nzType="primary" type="submit" [nzLoading]="saving">保存</button>
        </div>
      </form>
    }
  </nz-card>
</section>
