<section class="settings-page">
  <div class="page-heading">
    <title-label title="同步设置" description="维护同步、备份和运行监控的全局默认参数，保存后由后端统一存储。" />
    <div class="page-actions">
      <span class="saved-chip">更新时间 {{ formatTime(updateTime) }}</span>
      <button nz-button (click)="resetDefaults()">
        <i nz-icon nzType="reload"></i>
        推荐默认值
      </button>
      <button nz-button nzType="primary" [nzLoading]="saving" (click)="save()">
        <i nz-icon nzType="save"></i>
        保存设置
      </button>
    </div>
  </div>

  <nz-spin [nzSpinning]="loading">
    <form class="settings-layout" nz-form nzLayout="vertical" [formGroup]="form">
      <nz-card class="settings-card" [nzBordered]="false">
        <div class="card-heading">
          <h2>备份默认值</h2>
          <span>用于新建备份时的推荐配置</span>
        </div>

      <div class="form-grid">
        <nz-form-item>
          <nz-form-label nzRequired>默认批次大小</nz-form-label>
          <nz-form-control nzErrorTip="请输入大于 0 的批次大小">
            <nz-input-number formControlName="backupBatchSize" [nzMin]="1" [nzPrecision]="0" />
          </nz-form-control>
        </nz-form-item>

        <nz-form-item>
          <nz-form-label nzRequired>失败重试次数</nz-form-label>
          <nz-form-control nzErrorTip="请输入重试次数">
            <nz-input-number formControlName="backupRetryTimes" [nzMin]="0" [nzPrecision]="0" />
          </nz-form-control>
        </nz-form-item>

        <nz-form-item>
          <nz-form-label nzRequired>重试间隔 ms</nz-form-label>
          <nz-form-control nzErrorTip="请输入重试间隔">
            <nz-input-number
              formControlName="backupRetryIntervalMs"
              [nzMin]="0"
              [nzStep]="500"
              [nzPrecision]="0"
            />
          </nz-form-control>
        </nz-form-item>
      </div>

      <nz-form-item>
        <nz-form-label>TDengine 默认连接参数</nz-form-label>
        <nz-form-control>
          <textarea nz-input rows="3" formControlName="tdengineParams"></textarea>
        </nz-form-control>
      </nz-form-item>

      <nz-form-item>
        <nz-form-label>MySQL 默认连接参数</nz-form-label>
        <nz-form-control>
          <textarea nz-input rows="3" formControlName="mysqlParams"></textarea>
        </nz-form-control>
      </nz-form-item>
      </nz-card>

      <div class="side-stack">
        <nz-card class="settings-card" [nzBordered]="false">
          <div class="card-heading">
            <h2>同步与监控</h2>
            <span>控制台侧默认体验</span>
          </div>

        <nz-form-item>
          <nz-form-label nzRequired>同步默认批次</nz-form-label>
          <nz-form-control nzErrorTip="请输入同步批次">
            <nz-input-number formControlName="syncBatchSize" [nzMin]="1" [nzPrecision]="0" />
          </nz-form-control>
        </nz-form-item>

        <nz-form-item>
          <nz-form-label nzRequired>监控刷新秒数</nz-form-label>
          <nz-form-control nzErrorTip="刷新间隔至少 3 秒">
            <nz-input-number
              formControlName="monitorRefreshSeconds"
              [nzMin]="3"
              [nzPrecision]="0"
            />
          </nz-form-control>
        </nz-form-item>

        <nz-form-item>
          <nz-form-label nzRequired>日志级别</nz-form-label>
          <nz-form-control>
            <nz-select formControlName="logLevel">
              <nz-option nzValue="debug" nzLabel="debug" />
              <nz-option nzValue="info" nzLabel="info" />
              <nz-option nzValue="warn" nzLabel="warn" />
              <nz-option nzValue="error" nzLabel="error" />
            </nz-select>
          </nz-form-control>
        </nz-form-item>
        </nz-card>

        <nz-card class="settings-card" [nzBordered]="false">
          <div class="card-heading">
            <h2>保留策略</h2>
            <span>用于后续后端清理任务</span>
          </div>

        <nz-form-item>
          <nz-form-label nzRequired>通知保留天数</nz-form-label>
          <nz-form-control nzErrorTip="请输入保留天数">
            <nz-input-number
              formControlName="notificationRetentionDays"
              [nzMin]="1"
              [nzPrecision]="0"
            />
          </nz-form-control>
        </nz-form-item>

        <nz-form-item>
          <nz-form-label nzRequired>备份保留天数</nz-form-label>
          <nz-form-control nzErrorTip="请输入保留天数">
            <nz-input-number formControlName="backupRetentionDays" [nzMin]="1" [nzPrecision]="0" />
          </nz-form-control>
        </nz-form-item>
        </nz-card>
      </div>
    </form>
  </nz-spin>
</section>
